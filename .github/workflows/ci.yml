name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coi_public
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coi_public
      SECRET_KEY: test-secret-key-for-ci
      FLASK_ENV: testing
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: web_public/requirements.txt

      - name: Install dependencies
        run: pip install -r web_public/requirements.txt pytest pytest-cov

      - name: Apply schema
        run: psql -h localhost -U postgres -d coi_public -f web_public/sql/schema.sql

      - name: Run tests
        working-directory: web_public
        run: python -m pytest tests/ -v --tb=short --no-header
