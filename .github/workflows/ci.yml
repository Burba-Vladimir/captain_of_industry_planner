name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coi_public
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: web_public/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r web_public/requirements.txt
          pip install pytest pytest-cov

      - name: Apply schema
        run: |
          psql postgresql://postgres:postgres@localhost:5432/coi_public -f web_public/sql/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        run: |
          cd web_public
          python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coi_public
          SECRET_KEY: test-secret-key-for-ci
          FLASK_ENV: testing
